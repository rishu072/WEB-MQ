<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
    <style>
      .header{
        background-color: rgb(0, 145, 255);
        padding: 30px;
        color:white;
        border-radius: 5px;
        font-size: larger;
        font-weight: bolder;
        text-align: center; 
      }
      /* Container */
      .container{
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }
      .box{
        background-color: rgb(0, 234, 255);
        padding: 30px;
        color:white;
        border-radius: 5px;
        font-size: larger;
        font-weight: bolder;
        text-align: center; 
      }
      .header-2{
        background-color: rgb(225, 240, 255);
        padding: 30px;
        color:rgb(0, 0, 0);
        border-radius: 5px;
        font-size: larger;
        font-weight: bolder;
        text-align: center; 
      }
    </style>
</head>
<body>
    <div class="header">
    </div>
    <div class="header-2">
    </div>
    <div class="box">
    </div>
</body>
</html>
