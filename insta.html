<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Flexbox &amp; Grid Tutorial</title>
    <style>
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a3e 0%, #2d1b4e 100%);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .apps-card {
            grid-column: 1;
            background: rgba(100, 80, 200, 0.3);
            padding: 20px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .apps-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .apps-icons {
            display: flex;
            gap: 8px;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            background: #4a70ff;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .metric-card {
            background: rgba(100, 80, 200, 0.2);
            padding: 30px 20px;
            border-radius: 16px;
            text-align: center;
        }

        .metric-value {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .metric-label {
            font-size: 14px;
            opacity: 0.8;
        }
        .row-two {
            display: grid;
            grid-column: 1 / -1; /* Spans full width */
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .active-users {
            background: rgba(100, 80, 200, 0.2);
            padding: 30px 20px;
            border-radius: 16px;
        }

        .active-users-label {
            font-size: 14px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .active-users-count {
            font-size: 56px;
            font-weight: bold;
        }

        .active-users-change {
            font-size: 12px;
            color: #4a70ff;
            margin-top: 8px;
        }

        .design-placeholder {
            background: linear-gradient(135deg, #4a70ff 0%, #2a3fff 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
        }

        .subscribers {
            background: rgba(150, 200, 255, 0.2);
            padding: 30px 20px;
            border-radius: 16px;
            position: relative;
        }

        .live-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff3b4a;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
        }

        .subscribers-label {
            font-size: 14px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .subscribers-count {
            font-size: 56px;
            font-weight: bold;
            margin-bottom: 40px;
        }

        .chart-placeholder {
            height: 80px;
            background: rgba(150, 150, 200, 0.2);
            border-radius: 8px;
        }

        .growth-percent {
            font-size: 12px;
            color: #4a70ff;
            margin-top: 8px;
        }
        .description {
            grid-column: 1 / -1;
            background: rgba(100, 80, 200, 0.15);
            padding: 40px;
            border-radius: 16px;
            font-size: 18px;
            line-height: 1.6;
        }

        .launch-btn {
            background: #4a70ff;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .launch-btn:hover {
            background: #3556d9;
        }

        .launch-btn:active {
            transform: scale(0.96);
        }
    </style>

</head>
<body>
    <div class="dashboard">
        <div class="apps-card">
            <div class="apps-header">
                <span>A complete family of Apps</span>
                <button type="button" class="launch-btn">Launch Apps &rarr;</button>
            </div>
            <div class="apps-icons">
                <div class="app-icon">▶</div>
                <div class="app-icon">▶</div>
                <div class="app-icon">▶</div>
                <div class="app-icon">▶</div>
                <div class="app-icon">▶</div>
            </div>
        </div>

        <div class="metric-card">
            <div class="metric-value">25K</div>
            <div class="metric-label">Weekly Likes</div>
        </div>

        <!-- ROW 1: 50K Weekly Viewers -->
        <div class="metric-card">
            <div class="metric-value">50K</div>
            <div class="metric-label">Weekly Viewers</div>
        </div>

        <!-- ROW 2 (Grid container) -->
        <div class="row-two">
            <!-- Active Users -->
            <div class="active-users">
                <div class="active-users-label">Active Users</div>
                <div class="active-users-count">1,538</div>
                <div class="active-users-change">+154</div>
            </div>

            <!-- Design Center Placeholder -->
            <div class="design-placeholder">DESIGN</div>

            <!-- Total Subscribers -->
            <div class="subscribers">
                <div class="live-badge">🔴 LIVE</div>
                <div class="subscribers-label">Total Subscribers</div>
                <div class="subscribers-count">200K</div>
                <div class="chart-placeholder"></div>
                <div class="growth-percent">+7%</div>
            </div>
        </div>
    </div>
</body>
</html>
