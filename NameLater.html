<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letter R Grid</title>
    <style>
    .container {
      display: grid;
      grid-template-columns: repeat(8, 100px);
      grid-template-rows: repeat(8, 100px);
      gap: 10px;
      border: 2px solid red;
      width: fit-content;
      margin: 50px auto;
    }

    .box {
      background-color: rgb(0, 221, 255);
      border: 1px solid rgb(43, 60, 172);
      visibility: hidden;
    }

    .r-color {
      background-color: #ff3b4f;
      color: white;
      border-color: #d62233;
      visibility: visible;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box"></div>
    <div class="box r-color"></div>
    <div class="box r-color"></div>
    <div class="box r-color"></div>
    <div class="box r-color"></div>
    <div class="box r-color"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box"></div>
    <div class="box r-color"></div>
    <div class="box"></div>

    <div class="box r-color"></div>

    <div class="box r-color"></div>

</body>
</html>
