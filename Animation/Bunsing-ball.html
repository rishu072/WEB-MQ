<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Ball on Steps</title>

<!-- Import Outfit Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, #15122b 0%, #06040a 100%);
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    color: #ffffff;
}

/* Header styling */
.header {
    text-align: center;
    margin-bottom: 30px;
    z-index: 10;
}

.header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #00f2fe 0%, #ff007f 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 50px rgba(0, 242, 254, 0.3);
    margin-bottom: 6px;
    text-transform: uppercase;
}

.header p {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* Container styling */
.container {
    width: 700px;
    height: 500px;
    position: relative;
    background: rgba(255, 255, 255, 0.01);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 24px;
    box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.6), 
        inset 0 0 40px rgba(255, 255, 255, 0.02);
    backdrop-filter: blur(10px);
}

/* Ball */
.ball {
    width: 35px;
    height: 35px;
    border-radius: 50%;
    /* Gradient ball mimicking glowing energetic glass sphere */
    background: radial-gradient(circle at 35% 35%, #ffffff 0%, #ff007f 65%, #7f00ff 100%);
    position: absolute;
    left: 0;
    top: 0;
    transform-origin: bottom center;
    animation: 
        bounce 6s infinite ease-in-out,
        ball-glow 2s infinite alternate ease-in-out;
}

/* Steps */
.step {
    position: absolute;
    width: 30px;
    height: 20px;
    background: rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    transition: all 0.2s ease;
}

/* Position and individual animations for steps */
.s1 { left: 120px; top: 120px; animation: step-pulse-1 6s infinite ease-in-out; }
.s2 { left: 220px; top: 190px; animation: step-pulse-2 6s infinite ease-in-out; }
.s3 { left: 320px; top: 260px; animation: step-pulse-3 6s infinite ease-in-out; }
.s4 { left: 420px; top: 330px; animation: step-pulse-4 6s infinite ease-in-out; }
.s5 { left: 520px; top: 400px; animation: step-pulse-5 6s infinite ease-in-out; }

/* Ball Glow Animation */
@keyframes ball-glow {
    0% {
        box-shadow: 
            0 0 15px rgba(255, 0, 127, 0.6), 
            0 0 35px rgba(127, 0, 255, 0.4), 
            inset 0 0 10px rgba(255, 255, 255, 0.6);
    }
    100% {
        box-shadow: 
            0 0 25px rgba(255, 0, 127, 0.9), 
            0 0 55px rgba(127, 0, 255, 0.7), 
            inset 0 0 15px rgba(255, 255, 255, 0.8);
    }
}

/* Step pulse animations (synchronized with bounce keyframes) */
@keyframes step-pulse-1 {
    0%, 10%, 29%, 100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }
    15%, 22% {
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.8), inset 0 0 10px rgba(0, 242, 254, 0.4);
        background: rgba(0, 242, 254, 0.2);
        border-color: rgba(0, 242, 254, 0.8);
    }
}

@keyframes step-pulse-2 {
    0%, 33%, 52%, 100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }
    38%, 45% {
        box-shadow: 0 0 20px rgba(0, 255, 135, 0.8), inset 0 0 10px rgba(0, 255, 135, 0.4);
        background: rgba(0, 255, 135, 0.2);
        border-color: rgba(0, 255, 135, 0.8);
    }
}

@keyframes step-pulse-3 {
    0%, 55%, 74%, 100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }
    60%, 67% {
        box-shadow: 0 0 20px rgba(255, 235, 59, 0.8), inset 0 0 10px rgba(255, 235, 59, 0.4);
        background: rgba(255, 235, 59, 0.2);
        border-color: rgba(255, 235, 59, 0.8);
    }
}

@keyframes step-pulse-4 {
    0%, 75%, 92%, 100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }
    80%, 86% {
        box-shadow: 0 0 20px rgba(255, 94, 98, 0.8), inset 0 0 10px rgba(255, 94, 98, 0.4);
        background: rgba(255, 94, 98, 0.2);
        border-color: rgba(255, 94, 98, 0.8);
    }
}

@keyframes step-pulse-5 {
    0%, 91%, 100% {
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        background: rgba(255, 255, 255, 0.04);
        border-color: rgba(255, 255, 255, 0.1);
    }
    95%, 99% {
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.8), inset 0 0 10px rgba(255, 0, 127, 0.4);
        background: rgba(255, 0, 127, 0.2);
        border-color: rgba(255, 0, 127, 0.8);
    }
}

/* Physics & Bounce Animation */
@keyframes bounce {
    0% {
        left: 0;
        top: 0;
        transform: scale(1);
    }

    /* Step 1 */
    15% {
        left: 120px;
        top: 85px;
        transform: scale(1);
    }
    20% {
        left: 120px;
        top: 95px;
        transform: scale(1.15, 0.85); /* squish */
    }
    24% {
        left: 120px;
        top: 75px;
        transform: scale(1);
    }

    /* Step 2 */
    38% {
        left: 220px;
        top: 155px;
        transform: scale(1);
    }
    43% {
        left: 220px;
        top: 165px;
        transform: scale(1.15, 0.85); /* squish */
    }
    47% {
        left: 220px;
        top: 145px;
        transform: scale(1);
    }

    /* Step 3 */
    60% {
        left: 320px;
        top: 225px;
        transform: scale(1);
    }
    65% {
        left: 320px;
        top: 235px;
        transform: scale(1.15, 0.85); /* squish */
    }
    69% {
        left: 320px;
        top: 215px;
        transform: scale(1);
    }

    /* Step 4 */
    80% {
        left: 420px;
        top: 295px;
        transform: scale(1);
    }
    84% {
        left: 420px;
        top: 305px;
        transform: scale(1.15, 0.85); /* squish */
    }
    88% {
        left: 420px;
        top: 285px;
        transform: scale(1);
    }

    /* Step 5 */
    96% {
        left: 520px;
        top: 365px;
        transform: scale(1.15, 0.85);
    }

    100% {
        left: 520px;
        top: 365px;
        transform: scale(1.15, 0.85);
    }
}
</style>
</head>
<body>

<div class="container">
    <div class="ball"></div>

    <div class="step s1"></div>
    <div class="step s2"></div>
    <div class="step s3"></div>
    <div class="step s4"></div>
    <div class="step s5"></div>
</div>

</body>
</html>
