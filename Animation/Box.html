<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CSS Car Animation</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container & Stage */
        .container {
            width: 90%;
            max-width: 600px;
        }

        .stage {
            position: relative;
            width: 100%;
            height: 250px;
            background: linear-gradient(180deg, #1b2a47 0%, #0f172a 100%);
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Moving Road */
        .road {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background-color: #1e293b;
            border-top: 3px solid #ff007f; /* Pink neon divider */
        }

        .road-line {
            position: absolute;
            top: 22px;
            width: 200%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #ffffff 0, #ffffff 30px, transparent 30px, transparent 60px);
            animation: moveRoad 0.8s linear infinite;
        }

        /* Car Wrapper with vibration */
        .car {
            position: absolute;
            bottom: 35px;
            left: calc(50% - 75px);
            width: 150px;
            height: 75px;
            animation: bounce 0.15s ease-in-out infinite alternate;
        }

        /* Car Cabin / Roof */
        .car-top {
            position: absolute;
            top: 5px;
            left: 35px;
            width: 80px;
            height: 28px;
            background-color: #00f3ff; /* Cyan car color */
            border-radius: 12px 12px 0 0;
        }

        /* Windows */
        .window {
            position: absolute;
            top: 5px;
            width: 25px;
            height: 18px;
            background-color: #ffffff;
            opacity: 0.8;
        }

        .window-left {
            left: 10px;
            border-radius: 6px 0 0 0;
        }

        .window-right {
            right: 10px;
            border-radius: 0 6px 0 0;
        }

        /* Car Body */
        .car-body {
            position: absolute;
            top: 28px;
            left: 0;
            width: 150px;
            height: 32px;
            background-color: #00f3ff;
            border-radius: 6px 12px 6px 6px;
            box-shadow: inset 0 8px 10px rgba(255, 255, 255, 0.2);
        }

        /* Spinning Wheels */
        .wheel {
            position: absolute;
            bottom: 0;
            width: 34px;
            height: 34px;
            background-color: #0f172a;
            border-radius: 50%;
            border: 3px dashed #ffffff; /* Dashed style makes rotation visible */
            box-sizing: border-box;
            animation: spin 0.5s linear infinite;
            z-index: 2;
        }

        .wheel-left {
            left: 20px;
        }

        .wheel-right {
            right: 20px;
        }

        /* Keyframes */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes moveRoad {
            100% {
                transform: translateX(-60px);
            }
        }

        @keyframes bounce {
            100% {
                transform: translateY(-2px);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="stage">
            <!-- Road -->
            <div class="road">
                <div class="road-line"></div>
            </div>
            <!-- Simple Car -->
            <div class="car">
                <div class="car-top">
                    <div class="window window-left"></div>
                    <div class="window window-right"></div>
                </div>
                <div class="car-body"></div>
                <div class="wheel wheel-left"></div>
                <div class="wheel wheel-right"></div>
            </div>
        </div>
    </div>
</body>
</html>
