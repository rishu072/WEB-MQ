<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // let content_type = ["food","Trv_vlogs","Art","Daily_Vlogs"]
        let employees = [
            {
                name: "bhupendr",
                salary: 70,
                age: 50,
                country: "india",
                department: "IT",
                content_liked: ["food", "Travel_Vlogs", "art", "storytelling"],
                products_in_cart: [
                    { Pname: "Shirt", cost: 500 },
                    { Pname: "Shoes", cost: 2500 },
                    { Pname: "Watch", cost: 3500 }
                ]
            },
            {
                name: "rohan",
                salary: 50,
                age: 14,
                country: "london",
                department: "Finance",
                content_liked: ["daily_vlogs", "science", "art", "motivational"],
                products_in_cart: [
                    { Pname: "Shirt", cost: 500 },
                    { Pname: "Headphones", cost: 1800 }
                ]
            },
            {
                name: "kartik",
                salary: 3,
                age: 2,
                country: "america",
                department: "HR",
                content_liked: ["sports", "politics", "online_gaming", "science"],
                products_in_cart: [
                    { Pname: "Football", cost: 1200 },
                    { Pname: "Shoes", cost: 2500 }
                ]
            }
        ];

        // Combine all content_liked arrays into one single unique array
        let content_type = [...new Set(employees.flatMap(emp => emp.content_liked))];

        console.log("Single Content Type Array:", content_type);


        let obj = {
            num : 56,
            str : "rishu",
            bool : true,
            arr : [{},{}],
            obj : {Tkey : "Value"},
            func : function() {
                console.log("Nothing.")
            }
        }
        obj.num  = 88;
        obj.name = "rishu";
        
        console.log(Object.keys(obj));

        // Calculating spending capacity of each employee using a forEach loop
        employees.forEach(emp => {
            let totalCost = 0;
            // Iterate over products in cart to calculate total cost
            emp.products_in_cart.forEach(product => {
                totalCost += product.cost;
            });

            // Note: Employee salary is represented in thousands (e.g. 70k = 70,000)
            let actualSalary = emp.salary * 1000;
            let remainingCapacity = actualSalary - totalCost;

            console.log(`Employee Name: ${emp.name}`);
            console.log(`- Salary: $${actualSalary} (${emp.salary}k)`);
            console.log(`- Total Product Cost: $${totalCost}`);
            console.log(`- Remaining Spend Capacity: $${remainingCapacity}`);

            // Conditional check: Spent capacity compared to salary
            if (totalCost <= actualSalary / 2) {
                console.log(`- Status: Within safe spending limit (cost is less than or equal to half the salary)`);
            } else {
                console.log(`- Status: Exceeds half of the salary limit`);
            }
            console.log("-----------------------------------------");
        });
    </script>
</body>
</html>
