<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Query Table</title>
</head>

<body>
    <div class="container">
        <h1>Employee Directory</h1>

        <!-- Query Match Output -->
        <div id="query-output" class="query-card">
            Searching for employee...
        </div>

        <!-- Table Display -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Department</th>
                        <th>Salary</th>
                        <th>Age</th>
                        <th>Country</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <!-- Rows will be dynamically loaded -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let department = [
            { Dname: "IT", Dcode: 58, employees: { id: 1, employees: {} } }
        ];

        // Original employees list
        let employees = [
            { name: "bhupendr", salary: 70, age: 50, country: "india", department: "IT" },
            { name: "rohan", salary: 50, age: 14, country: "london", department: "Finance" },
            { name: "kartik", salary: 3, age: 2, country: "amarica", department: "HR" },
            { name: "suraj", salary: 2, age: 19, country: "russia", department: "Finance" },
            { name: "aryan", salary: 1, age: 70, country: "japan", department: "HR" },
            { name: "aryan", salary: 88, age: 40, country: "japan", department: "IT" },
            { name: "jatin", salary: 100, age: 12, country: "russia", department: "HR" },
            { name: "aaditya", salary: 20, age: 19, country: "india", department: "Marketing" },
            { name: "sachi", salary: 1, age: 2, country: "uganda", department: "Finance" },
            { name: "khushi", salary: 35, age: 99, country: "brazil", department: "IT" },
            { name: "parul", salary: 500, age: 34, country: "zamaika", department: "CEO" }
        ];
        
        employees.push({ name: "rishu", salary: 90, age: 25, country: "india", department: "HR" });
        // Adding a new employee object with valid properties (corrected typo: counntry -> country)
        employees.push({ name: "brksaajaskp", salary: 79,  age: 27, country: "india", department: "nnrno" });

        const tableBody = document.getElementById("table-body");
        const queryOutput = document.getElementById("query-output");

        let rowsHtml = "";
        let matchedMsg = "";

        // Using forEach loop and template literals to construct table rows and identify matching employee
        employees.forEach(emp => {
            const isMatch = emp.department === "HR" && emp.name.toLowerCase() === "rishu" && emp.country.toLowerCase() === "india";
            
            if (isMatch) {
               
                matchedMsg = `<strong>Match Result:</strong> Found employee <em>${emp.name}</em> who works in the <em>${emp.department}</em> department and is from <em>${emp.country}</em>.`;
                console.log(`Matched Employee: ${emp.name} is from the ${emp.department} department and is from ${emp.country}.`);
            }

            rowsHtml += `
                <tr class="${isMatch ? 'highlight-row' : ''}">
                    <td style="text-transform: capitalize;">${emp.name}</td>
                    <td>${emp.department}</td>
                    <td>$${emp.salary}k</td>
                    <td>${emp.age} yrs</td>
                    <td style="text-transform: capitalize;">${emp.country}</td>
                </tr>
            `;
        });

        tableBody.innerHTML = rowsHtml;

       
        if (matchedMsg) {
            queryOutput.innerHTML = matchedMsg;
        } else {
            queryOutput.innerHTML = `<strong>Match Result:</strong> No employee matched the criteria.`;
        }
        
        let filterArr = employees.filter(item => {
            return item.salary > 50;
        });
        console.log(filterArr);

        // Filter employees whose names start with 'S' or 's'
        let startsWithS = employees.filter(item => {
            return item.name.toLowerCase().startsWith('s');
        });
        console.log("Employees whose names start with 'S':", startsWithS);

        // Separate filters for each department (IT, CS, and all others)
        let itEmployees = employees.filter(item => item.department.toLowerCase() === 'it');
        let csEmployees = employees.filter(item => item.department.toLowerCase() === 'cs');
        let hrEmployees = employees.filter(item => item.department.toLowerCase() === 'hr');
        let financeEmployees = employees.filter(item => item.department.toLowerCase() === 'finance');
        let marketingEmployees = employees.filter(item => item.department.toLowerCase() === 'marketing');
        let ceoEmployees = employees.filter(item => item.department.toLowerCase() === 'ceo');

        console.log("IT Department Employees:", itEmployees);
        console.log("CS Department Employees (Empty):", csEmployees);
        console.log("HR Department Employees:", hrEmployees);
        console.log("Finance Department Employees:", financeEmployees);
        console.log("Marketing Department Employees:", marketingEmployees);
        console.log("CEO Department Employees:", ceoEmployees);

        // --- Additional Calculations ---

        // 1. Map to get name, first letter, and salary for each employee
        let firstLetterAndSalary = employees.map(emp => {
            return {
                firstLetter: emp.name.trim().charAt(0).toUpperCase(),
                name: emp.name,
                salary: emp.salary
            };
        });
        console.log("Employees Name First Letter and Salary:", firstLetterAndSalary);

        // 2. Average salary of all employees
        let avgSalaryAll = employees.reduce((sum, emp) => sum + emp.salary, 0) / employees.length;
        console.log(`Average Salary of all employees: $${avgSalaryAll.toFixed(2)}k`);

        // 3. Average salary by department
        let deptTotals = {};
        let deptCounts = {};
        employees.forEach(emp => {
            let dept = emp.department;
            deptTotals[dept] = (deptTotals[dept] || 0) + emp.salary;
            deptCounts[dept] = (deptCounts[dept] || 0) + 1;
        });
        let deptAverages = Object.keys(deptTotals).map(dept => {
            return {
                department: dept,
                avgSalary: (deptTotals[dept] / deptCounts[dept]).toFixed(2)
            };
        });
        console.log("Average Salary by Department:", deptAverages);

        // 4. Chosen country filtering (e.g., "india")
        let chosenCountry = "india";
        let countryFilterList = employees.filter(emp => emp.country.toLowerCase() === chosenCountry.toLowerCase());
        console.log(`Employees from chosen country (${chosenCountry}):`, countryFilterList);

        // 5. Output to stats-output element on the page
        const statsOutput = document.getElementById("stats-output");
        
        let mappedNamesHtml = firstLetterAndSalary.map(item => {
            return `<li>First Letter: <strong>${item.firstLetter}</strong> | Name: <em>${item.name}</em> | Salary: <em>$${item.salary}k</em></li>`;
        }).join("");

        let deptAveragesHtml = deptAverages.map(item => {
            return `<li>${item.department}: <strong>$${item.avgSalary}k</strong></li>`;
        }).join("");

        let countryListHtml = countryFilterList.map(item => {
            return `<li style="text-transform: capitalize;">${item.name} (${item.department})</li>`;
        }).join("");

        statsOutput.innerHTML = `
            <strong>1. Name, First Letter & Salary:</strong>
            <ul>${mappedNamesHtml}</ul>
            <hr style="margin: 1rem 0; border: none; border-top: 1px solid rgba(255,255,255,0.15);">
            <strong>2. Average Salary of All Employees:</strong>
            <p><strong>$${avgSalaryAll.toFixed(2)}k</strong></p>
            <hr style="margin: 1rem 0; border: none; border-top: 1px solid rgba(255,255,255,0.15);">
            <strong>3. Average Salary by Department:</strong>
            <ul>${deptAveragesHtml}</ul>
            <hr style="margin: 1rem 0; border: none; border-top: 1px solid rgba(255,255,255,0.15);">
            <strong>4. Employees from Chosen Country (${chosenCountry.toUpperCase()}):</strong>
            <ul>${countryListHtml}</ul>
        `;
    </script>
</body>

</html>
