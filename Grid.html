<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      row-gap: 10px;
    }

    .box {
      background-color: rgb(255, 0, 0);
      padding: 20px;
      text-align: center;
      font-size: 20px;
      border: 1px solid black;
    }
  </style>
</head>
<body>
     <div class="container">
    <div class="box">1</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
    <div class="box">5</div>
    <div class="box">6</div>
  </div>
</body>
</html>
