<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .container {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      row-gap: 10px;
    }

    .box {
      background-color: rgb(0, 221, 255);
      padding: 20px;
      text-align: center;
      font-size: 20px;
      border: 1px solid rgb(43, 60, 172);
      row-gap: 16px;
      column-gap: 24px;
    }
  </style>
</head>
<body>
     <div class="container">
    <div class="box">A</div>
    <div class="box">B</div>
    <div class="box">C</div>
    <div class="box">D</div>
    <div class="box">E</div>
    <div class="box">F</div>
  </div>
</body>
</html>
