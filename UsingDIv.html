<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Alignment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

.container{
    display:grid;
    grid-template-columns:200px 1fr 200px;
    grid-template-rows:200px 1fr 200px;
    grid-template-areas:
        "one two three"
        "four five six"
        "seven eight nine";
    gap:10px;
    height:100vh;
    margin:10px;
}

.box1{
    width:90px;
    height:90px;
    background: #ffffff;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
}

.one,.two,.three,.four,.five,.six,.seven,.eight,.nine{
    display:flex;
    padding: 10px;
}

.one{grid-area:one; background:#f43f5e;} 
.two{grid-area:two; background:#f97316;} 
.three{grid-area:three; background:#eab308;} 
.four{grid-area:four; background:#22c55e;} 
.five{grid-area:five; background:#06b6d4;} 
.six{grid-area:six; background:#3b82f6;} 
.seven{grid-area:seven; background:#6366f1;} 
.eight{grid-area:eight; background:#a855f7;} 
.nine{grid-area:nine; background:#64748b;} 
/* Top Row */
.one{
    justify-content:flex-up;
    align-items:flex-start;
}

.two{
    justify-content:center;
    align-items:last baseline;
}

.three{
    justify-content:flex-end;
    align-items:flex-up;
}

/* Middle Row */
.four{
    justify-content:start;
    align-items: center;
}

.five{
    justify-content:center;
    align-items:center;
}

.six{
    justify-content:flex-end;
    align-items:center;
}

/* Bottom Row */
.seven{
    justify-content:flex-start;
    align-items:end;
}

.eight{
      justify-content:flex-start;
     align-items:flex-start,center;
}

.nine{
     justify-content:flex-end;
    align-items:end;
}
</style>
</head>

<body>
<div class="container">
    <div class="one"><div class="box1"></div></div>
    <div class="two"><div class="box1"></div></div>
    <div class="three"><div class="box1"></div></div>
    <div class="four"><div class="box1"></div></div>
    <div class="five"><div class="box1"></div></div>
    <div class="six"><div class="box1"></div></div>
    <div class="seven"><div class="box1"></div></div>
    <div class="eight"><div class="box1"></div></div>
    <div class="nine"><div class="box1"></div></div>
</div>
</body>
</html>
