<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Areas Practice</title>
    <style>
        .container {
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            grid-template-rows: 80px 1fr 60px;
            grid-template-areas: 
                "header header header"
                "sider main aside"
                "footer footer footer";         
            gap: 10px;
            height: 100vh;
            padding: 10px;
            box-sizing: border-box;
            background-color: #f0f0f0;
        }
        
        .header { 
            grid-area: header;
            background-color: #1f6feb; /* Blue */
        }
        
        .sider {
            grid-area: sider; /* Fixed mismatch: was 'sidebar' */
            background-color: #1f9254; /* Green */
        }
        
        .main {
            grid-area: main;
            background-color: #f39c12; /* Orange */
        }
        
        .aside {
            grid-area: aside;
            background-color: #9b59b6; /* Purple */
        }
        
        .footer {
            grid-area: footer;
            background-color: #2c3e50; /* Dark blue/gray */
        }
        
        .col {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Added correct classes to match CSS selectors -->
        <div class="col header">Header</div>
        <div class="col sider">Sider</div>
        <div class="col main">Main</div>
        <div class="col aside">Aside</div>
        <div class="col footer">Footer</div>
    </div>
</body>
</html>
