<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipkart Clone</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f1f3f6;
      }

      /* HEADER */

      .header {
        background: white;
        padding: 15px 20px;
        border-bottom: 1px solid #ddd;
      }

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .logo-section {
        display: flex;
        gap: 20px;
        align-items: center;
      }

      .flipkart-btn {
        background: #ffe500;
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: bold;
      }

      .travel-btn {
        background: #f2f2f2;
        padding: 12px 25px;
        border-radius: 12px;
        font-weight: bold;
      }

      .location {
        margin-right: 175px;
        font-size: 15px;
      }

      .search-bar {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .search-bar input {
        width: 75%;
        height: 40px;
        padding: 14px;
        border: 2px solid #2874f0;
        border-radius: 12px;
        font-size: 18px;
      }

      .menu {
        display: flex;
        gap: 25px;
        font-size: 18px;
      }

      /* CATEGORY */

      .categories {
        background: white;
        display: flex;
        justify-content: space-around;
        padding: 15px 5px;
        border-bottom: 1px solid #ddd;
      }

      .cat {
        text-align: center;
        font-size: 15px;
      }

      .cat img {
        width: 20px;
        height: 20px;
        margin-bottom: 8px;
      }


      /* BANNER */

      .banner-wrapper {
        overflow: hidden;
        width: 100%;
        background: #f1f3f6;
      }

      .banner-section {
        display: flex;
        gap: 20px;
        padding: 20px;
        width: max-content;

        animation: slide 15s linear infinite;
      }

      .banner {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        min-width: 420px;
        flex-shrink: 0;
      }

      .banner img {
        width: 420px;
        height: 250px;
        object-fit: cover;
      }

      

      /* PRODUCTS */

      .product-section {
        background: #f4ff00;
        margin: 20px;
        padding: 20px;
        border-radius: 20px;
      }

      .product-section h2 {
        margin-bottom: 20px;
        font-size: 35px;
      }

      .products {
        display: flex;
        gap: 20px;
      }

      .card {
        background: white;
        border-radius: 12px;
        width: 25%;
        overflow: hidden;
      }


      .card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
      }

      .card-content {
        padding: 12px;
      }

      .card-content h3 {
        margin-bottom: 8px;
        font-size: 22px;
      }

      .card-content p {
        font-size: 22px;
        font-weight: bold;
      }
      .menuIcon {
        text-decoration: none;
        color: black;
      }
      a {
        text-decoration: none;
        color: #2874f0;
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->

    <div class="header">
      <div class="top-bar">
        <div class="logo-section">
          <div class="flipkart-btn">
            <img
              src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTIygUTsIdSAR0MwbnUyNloj8ZCCWVZylTBBQ&s"
              alt="Flipkart"
              style="width: px; height: 25px; border-radius: 50%"
            />
            Flipkart
          </div>
          <div class="travel-btn">✈ Travel</div>
        </div>

        <div class="location">
          📍 Location not set <a href="#">Select Delivery Location &gt; </a>
        </div>
      </div>

      <div class="search-bar">
        <input type="text" placeholder="Search for Products, Brands and More" />

        <div class="menu">
          <a
            class="menuIcon"
            href="https://www.flipkart.com/account/login?ret=/"
            >Login</a
          >
          <a
            class="menuIcon"
            href="https://www.flipkart.com/?pageUID=1779680798573#"
            >More</a
          >
          <span>🛒 Cart</span>
        </div>
      </div>
    </div>

    <!-- CATEGORY -->

    <div class="categories">
      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/all.svg"
        />
        <p>For You</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/fashion.svg"
        />
        <p>Fashion</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/mobiles.svg"
        />
        <p>Mobiles</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/beauty.svg"
        />
        <p>Beauty</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/electronics.svg"
        />
        <p>Electronics</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/home-final.svg"
        />
        <p>Home</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/tv.svg"
        />
        <p>Appliances</p>
      </div>

      <div class="cat">
        <img
          src="https://static-assets-web.flixcart.com/apex-static/images/svgs/L1Nav/toy.svg"
        />
        <p>Toys</p>
      </div>
    </div>

    <!-- BANNERS -->

    <div class="banner-section marquee">
      <div class="banner">
        <img
          src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/b8676360a79b1c16.jpg?q=60"
        />
      </div>

      <div class="banner">
        <img
          src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/3586260287b677eb.jpg?q=60"
        />
      </div>

      <div class="banner">
        <img
          src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/458de2d6f8e6dd4d.png?q=60"
        />
      </div>
      <div class="banner">
        <img
          src="https://rukminim2.flixcart.com/fk-p-flap/3200/1560/image/b8676360a79b1c16.jpg?q=60"
        />
      </div>

      
    </div>

    <!-- PRODUCT SECTION -->

    <div class="product-section">
      <h2>People also viewed</h2>

      <div class="products">
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1508614589041-895b88991e3e"
          />
          <div class="card-content">
            <h3>Top Deals</h3>
            <p>Under ₹199</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
          />
          <div class="card-content">
            <h3>Top Picks</h3>
            <p>Min. 70% Off</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1523398002811-999ca8dec234"
          />
          <div class="card-content">
            <h3>Best Discounts</h3>
            <p>Latest Fashion</p>
          </div>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1492144534655-ae79c964c9d7"
          />
          <div class="card-content">
            <h3>Special Offer</h3>
            <p>Remote Cars</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
