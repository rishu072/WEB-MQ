<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>User Info</h1>
    <form>
        <fieldset>
            <legend>Text Inputs</legend>

            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" name="fullName" placeholder="Enter your name here">
            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com">
            <br><br>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password">
            <br><br>

            <label for="search">Search:</label>
            <input type="search" id="search" name="search" placeholder="Search here">
            <br><br>

            <label for="phone">Phone:</label>
            <input type="tel" id="phone" name="phone" placeholder="xxxxxxxxxxx">
            <br><br>

            <label for="website">Website:</label>
            <input type="url" id="website" name="website" placeholder="https://example.com">
            <br><br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Number Inputs</legend>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" value="" placeholder="Your age in Years">
            <br><br>

            <label for="volume">Volume:</label>
            <input type="range" id="volume" name="volume">
            <br><br>
        </fieldset>
        <br>

        <fieldset>
            <legend>Date & Time Inputs</legend>

            <label for="date">Date:</label>
            <input type="date" id="date" name="date">
            <br><br>

            <label for="time">Time:</label>
            <input type="time" id="time" name="time">
            <br><br>

            <label for="datetime">Date & Time:</label>
            <input type="datetime-local" id="datetime" name="datetime">
            <br><br>

            <label for="month">Month:</label>
            <input type="month" id="month" name="month">
            <br><br>
        </fieldset>
    </form>

</body>
</html>
