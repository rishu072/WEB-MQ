<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jhula Animation</title>
  <style>
    .rope {
      width: 4px;
      height: 150px;
      background: #444;
      margin: 0 auto;
    }

    .seat {
      width: 120px;
      height: 30px;
      background: #ff9933;
      margin: 0 auto;
      border-radius: 5px;
      transform-origin: top center;
      animation: swing 3s infinite ease-in-out;
    }

    @keyframes swing {
      0%   { transform: rotate(12deg); }
      50%  { transform: rotate(-12deg); }
      100% { transform: rotate(12deg); }
    }

    .jhula {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <div class="jhula">
    <div class="rope"></div>
    <div class="seat"></div>
  </div>
</body>
</html>
